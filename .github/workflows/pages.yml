name: Pages

on:
  push:
    branches:
      - main
    paths:
      - docs/**
      - actiongraph-*/src/main/java/**
      - actiongraph-*/build.gradle.kts
      - .github/workflows/pages.yml
      - build.gradle.kts
      - settings.gradle.kts
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 10

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Generate Javadocs
        run: ./gradlew javadoc

      - name: Assemble Site
        run: |
          rm -rf build/pages-site
          mkdir -p build/pages-site
          cp -R docs/. build/pages-site/
          mkdir -p build/pages-site/api/javadoc
          for module in \
            actiongraph-core \
            actiongraph-control-plane-api \
            actiongraph-human-review \
            actiongraph-governance \
            actiongraph-llm-deepseek \
            actiongraph-persistence-jdbc \
            actiongraph-console \
            actiongraph-spring-boot-starter
          do
            cp -R "$module/build/docs/javadoc" "build/pages-site/api/javadoc/$module"
          done

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Site
        uses: actions/upload-pages-artifact@v5
        with:
          path: build/pages-site

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v5
