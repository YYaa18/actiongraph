name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build And Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set Up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Build
        run: ./gradlew build --no-daemon --stacktrace

      - name: Binary Compatibility
        run: ./gradlew verifyBinaryCompatibility --no-daemon --stacktrace

      - name: Set Up Java 8
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 8

      - name: Verify Java 8 Maven Consumer On JDK 8
        run: >
          mvn -q
          -f docs/examples/java8-maven-consumer/pom.xml
          -Djava8.consumer.build.directory=${{ github.workspace }}/build/java8-maven-consumer-jdk8
          clean compile
